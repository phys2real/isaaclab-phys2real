params:
  seed: 42
  # seed: 46

  # environment wrapper clipping
  env:
    # added to the wrapper
    clip_observations: 5.0
    # can make custom wrapper?
    clip_actions: 1.0

  algo:
    name: a2c_continuous

  model:
    name: continuous_a2c_logstd

  # doesn't have this fine grained control but made it close
  network:
    name: actor_critic
    separate: False
    space:
      continuous:
        mu_activation: None
        sigma_activation: None

        mu_init:
          name: default
        sigma_init:
          name: const_initializer
          val: 0.3
          # val: 0.04
        fixed_sigma: True
    mlp:
      # units: [32, 32]
      # units: [128, 64]
      units: [128, 128]
      activation: elu
      d2rl: False

      initializer:
        name: default
      regularizer:
        name: None

  load_checkpoint: False # flag which sets whether to load the checkpoint
  load_path: '' # path to the checkpoint to load

  config:
    name: xarm_push_ik_rel_newisaaclab_com_slower5_phase15
    env_name: rlgpu
    device: 'cuda:0'
    device_name: 'cuda:0'
    multi_gpu: False
    ppo: True
    mixed_precision: False
    normalize_input: True
    normalize_value: True
    num_actors: -1  # configured from the script (based on num_envs)
    reward_shaper:
      # scale_value: 0.1
      scale_value: 0.01
    normalize_advantage: True
    # gamma: 0.99
    gamma: 0.95
    tau : 0.95
    learning_rate: 5e-4
    lr_schedule: adaptive
    kl_threshold: 0.008
    score_to_win: 100000
    max_epochs: 4000
    save_best_after: 100
    save_frequency: 50
    grad_norm: 1.0
    # entropy_coef: 0.0
    entropy_coef: 0.01
    truncate_grads: True
    e_clip: 0.2
    # horizon_length: 32
    # horizon_length: 64
    horizon_length: 96
    # horizon_length: 72
    # horizon_length: 128
    minibatch_size: 16384
    mini_epochs: 8
    critic_coef: 4
    clip_value: True
    seq_length: 4
    bounds_loss_coef: 0.0001